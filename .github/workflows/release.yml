name: Release

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: write

jobs:
  validate-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: tag_version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract version from manifest.json
        id: manifest_version
        run: |
          version=$(python3 -c "import json; print(json.load(open('custom_components/chargeamps/manifest.json'))['version'])")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Validate versions match
        run: |
          tag="${{ steps.tag_version.outputs.version }}"
          manifest="${{ steps.manifest_version.outputs.version }}"
          if [ "$tag" != "$manifest" ]; then
            echo "::error::Tag version ($tag) does not match manifest.json version ($manifest)"
            exit 1
          fi

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          name: "v${{ steps.tag_version.outputs.version }}"
